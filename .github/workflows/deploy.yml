name: Deploy to Coolify
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  version-bump:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch version
        run: |
          # Bump all package.json files that have a version field
          for f in claw-voice/package.json dashboard/package.json; do
            if [ -f "$f" ]; then
              node -e "
                const fs = require('fs');
                const pkg = JSON.parse(fs.readFileSync('$f', 'utf8'));
                const [maj, min, pat] = pkg.version.split('.').map(Number);
                pkg.version = maj + '.' + min + '.' + (pat + 1);
                fs.writeFileSync('$f', JSON.stringify(pkg, null, 2) + '\n');
                console.log('$f:', pkg.version);
              "
            fi
          done

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: bump patch version [skip ci]"
          git push

  deploy:
    runs-on: ubuntu-latest
    needs: version-bump
    if: always() && !failure() && !cancelled()
    steps:
      - name: Trigger Coolify deploy
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          curl -sf -X POST \
            "https://coolify.forge.dexmind.ai/api/v1/deploy?uuid=tsokgskkswss0s4ogogk8soo" \
            -H "Authorization: Bearer $COOLIFY_TOKEN" \
            -H "Accept: application/json"
